services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SEARCH_INDEX_WORKER_MODE: external
      SEARCH_INDEX_QUEUE_BACKEND: firestore
      SEARCH_INDEX_FIRESTORE_COLLECTION: search_index_tasks
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      SEARCH_INDEX_WORKER_MODE: external
      SEARCH_INDEX_QUEUE_BACKEND: firestore
      SEARCH_INDEX_FIRESTORE_COLLECTION: search_index_tasks
    command: sh -c "uvicorn app.worker_main:app --host 0.0.0.0 --port 8010"
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8010/health/deep"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
